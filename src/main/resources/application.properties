spring.application.name=parking

server.port=3003

spring.datasource.url=jdbc:mysql://localhost:3306/parking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

garage.simulator.base-url=http://localhost:3000

spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=10000,expireAfterWrite=30s

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=parking

resilience4j.circuitbreaker.instances.garageSimulator.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.garageSimulator.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.garageSimulator.sliding-window-size=10
resilience4j.circuitbreaker.instances.garageSimulator.wait-duration-in-open-state=10s

resilience4j.retry.instances.garageSimulator.max-attempts=3
resilience4j.retry.instances.garageSimulator.wait-duration=500ms
resilience4j.retry.instances.garageSimulator.enable-exponential-backoff=true
resilience4j.retry.instances.garageSimulator.exponential-backoff-multiplier=2

resilience4j.timelimiter.instances.garageSimulator.timeout-duration=3s

